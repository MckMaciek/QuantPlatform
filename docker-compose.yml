name: quant-platform

services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "${VAULT_PORT}:${VAULT_PORT}"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:${VAULT_PORT}"
    command: server -dev
    cap_add:
      - IPC_LOCK
    restart: always
    
  vault-initializer:
    image: hashicorp/vault:latest
    container_name: vault-initializer
    environment:
      VAULT_TOKEN: ${ROOT_TOKEN}
      VAULT_ADDR: ${VAULT_ADDR}
      FINNHUB_TOKEN: ${FINNHUB_TOKEN}
    volumes:
      - ./init-vault.sh:/tmp/init-vault.sh
    entrypoint: ["/bin/sh", "/tmp/init-vault.sh"]
    cap_add:
      - IPC_LOCK
    depends_on:
      - vault

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"