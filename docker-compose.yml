name: quant-platform

services:
  vault:
    image: hashicorp/vault:1.15.6
    container_name: vault
    ports:
      - "${VAULT_PORT}:${VAULT_PORT}"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:${VAULT_PORT}"
    command: server -dev
    cap_add:
      - IPC_LOCK
    restart: always
    
  vault-initializer:
    image: hashicorp/vault:1.15.6
    container_name: vault-initializer
    environment:
      VAULT_TOKEN: ${ROOT_TOKEN}
      VAULT_ADDR: ${VAULT_ADDR}
      FINNHUB_TOKEN: ${FINNHUB_TOKEN}
    volumes:
      - ./init-vault.sh:/tmp/init-vault.sh
    entrypoint: ["/bin/sh", "/tmp/init-vault.sh"]
    cap_add:
      - IPC_LOCK
    depends_on:
      - vault

  postgres:
    image: postgres:18-alpine
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: marketdb
    volumes:
      - ./postgres_data:/var/lib/postgresql

  finnhub-data-connector:
    build: ./FinnHub-Data-Connector/
    container_name: finnhub-data-connector
    ports:
      - "${FINNHUB_DATA_CONNECTOR_PORT}:${FINNHUB_DATA_CONNECTOR_PORT}"
    environment:
      SERVER_PORT: "${FINNHUB_DATA_CONNECTOR_PORT}"
      SPRING_CLOUD_VAULT_TOKEN: ${ROOT_TOKEN}
      SPRING_PROFILES_ACTIVE: "local"
      SPRING_CLOUD_VAULT_URI: "http://vault:${VAULT_PORT}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_KAFKA_PRODUCER_PROPERTIES_RETRY_BACKOFF_MS: 1000
      SPRING_KAFKA_PRODUCER_PROPERTIES_RECONNECT_BACKOFF_MS: 1000
      SPRING_KAFKA_ADMIN_PROPERTIES_RETRY_BACKOFF_MS: 2000
    depends_on:
      - vault-initializer
      - kafka

  normalization:
    build: ./Normalization/
    container_name: normalization
    ports:
      - "${NORMALIZATION_PORT}:${NORMALIZATION_PORT}"
    environment:
      SERVER_PORT: "${NORMALIZATION_PORT}"
      SPRING_PROFILES_ACTIVE: "local"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_KAFKA_CONSUMER_PROPERTIES_RETRY_BACKOFF_MS: 1000
      SPRING_KAFKA_CONSUMER_PROPERTIES_RECONNECT_BACKOFF_MS: 1000
      SPRING_KAFKA_PRODUCER_PROPERTIES_RETRY_BACKOFF_MS: 1000
      SPRING_KAFKA_PRODUCER_PROPERTIES_RECONNECT_BACKOFF_MS: 1000
      SPRING_KAFKA_ADMIN_PROPERTIES_RETRY_BACKOFF_MS: 2000
    depends_on:
      - kafka
      - finnhub-data-connector

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CLUSTER_ID: "4L62ydgTW626uEOWDX6fA"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data: